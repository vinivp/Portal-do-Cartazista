<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Global - Loja 62</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      /* ... Seus estilos base ... */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }
      body {
        background:
          linear-gradient(rgba(15, 35, 80, 0.8), rgba(15, 35, 80, 0.8)),
          url("/imagem/frente01loja62.png");
        background-size: cover;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .chat-container {
        width: 90%;
        max-width: 500px;
        height: 80vh;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .chat-header {
        background: #44bd32;
        color: white;
        padding: 15px;
        text-align: center;
        font-weight: bold;
      }
      #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* Estilo para imagens com fundo xadrez (transparência) */
      .msg img {
        max-width: 100%;
        border-radius: 10px;
        margin-top: 5px;
        display: block;
        cursor: pointer;
        background-image:
          linear-gradient(45deg, #333 25%, transparent 25%),
          linear-gradient(-45deg, #333 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #333 75%),
          linear-gradient(-45deg, transparent 75%, #333 75%);
        background-size: 10px 10px;
        background-position:
          0 0,
          0 5px,
          5px -5px,
          -5px 0px;
        background-color: #444;
      }

      /* Balões de mensagem */
      .msg {
        background: rgba(255, 255, 255, 0.2);
        padding: 10px;
        border-radius: 10px;
        max-width: 80%;
        color: white;
      }
      .msg b {
        color: #44bd32;
        display: block;
        font-size: 0.7rem;
        margin-bottom: 3px;
      }
      .minha-msg {
        align-self: flex-end;
        background: #44bd32;
      }
      .minha-msg b {
        color: #0f2350;
      }

      /* Ações lado a lado (Botão Baixar e Lixeira) */
      .msg-actions {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-top: 8px;
        padding-top: 5px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .btn-download {
        background: transparent;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 0.75rem;
        display: flex;
        align-items: center;
        gap: 5px;
        opacity: 0.8;
      }
      .btn-delete {
        color: white;
        opacity: 0.5;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .btn-delete:hover {
        color: #ff4757;
        opacity: 1;
      }

      .chat-input-area {
        padding: 15px;
        background: rgba(0, 0, 0, 0.3);
        display: flex;
        gap: 10px;
      }
      input[type="text"] {
        flex: 1;
        padding: 12px;
        border-radius: 25px;
        border: none;
        outline: none;
      }
      .btn-send {
        background: #44bd32;
        color: white;
        border: none;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">
        <i class="fas fa-globe"></i> CHAT GLOBAL - CARTAZISTAS
      </div>
      <div id="chat-messages"></div>
      <div class="chat-input-area">
        <input
          type="file"
          id="fileInput"
          style="display: none"
          accept="image/*,application/pdf"
          onchange="uploadArquivo(this)"
        />
        <button
          type="button"
          onclick="document.getElementById('fileInput').click()"
          style="background: #555"
          class="btn-send"
        >
          <i class="fas fa-paperclip"></i>
        </button>
        <input
          type="text"
          id="messageInput"
          placeholder="Digite sua mensagem..."
        />
        <button onclick="enviarMensagem()" class="btn-send">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onChildAdded,
        onChildRemoved,
        remove,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyB-Zz9fdr3rQzM-COyWoUA9_egkHfSXKfE",
        authDomain: "portal-cartazista.firebaseapp.com",
        databaseURL: "https://portal-cartazista-default-rtdb.firebaseio.com",
        projectId: "portal-cartazista",
        storageBucket: "portal-cartazista.firebasestorage.app",
        messagingSenderId: "1095457028300",
        appId: "1:1095457028300:web:997edfb47a1d2e8f54ea69",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const chatRef = ref(db, "mensagens");
      const nomeUsuario = sessionStorage.getItem("nomeUsuario") || "Anônimo";
      const somNotificacao = new Audio(
        "https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3",
      );
      let carregamentoInicial = true;

      // Função de Download Binário
      window.baixarArquivo = async function (url, nomeArquivo) {
        try {
          const response = await fetch(url);
          const blob = await response.blob();
          const blobUrl = window.URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = blobUrl;
          link.download = nomeArquivo || "arquivo.png";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          window.URL.revokeObjectURL(blobUrl);
        } catch (e) {
          window.open(url, "_blank");
        }
      };

      // Upload ImgBB
      window.uploadArquivo = async function (input) {
        const file = input.files[0];
        if (!file) return;
        const msgInput = document.getElementById("messageInput");
        msgInput.placeholder = "Enviando...";
        msgInput.disabled = true;

        const formData = new FormData();
        formData.append("image", file);

        try {
          const response = await fetch(
            `https://api.imgbb.com/1/upload?key=d9dfe3393297e81750679887f742711e`,
            { method: "POST", body: formData },
          );
          const data = await response.json();
          push(chatRef, {
            usuario: nomeUsuario,
            texto: data.data.url,
            tipo: file.type.includes("pdf") ? "pdf" : "imagem",
            nomeOriginal: file.name,
            timestamp: Date.now(),
          });
        } catch (error) {
          alert("Erro no upload!");
        } finally {
          msgInput.placeholder = "Digite sua mensagem...";
          msgInput.disabled = false;
        }
      };

      window.enviarMensagem = function () {
        const input = document.getElementById("messageInput");
        if (input.value.trim()) {
          push(chatRef, {
            usuario: nomeUsuario,
            texto: input.value,
            tipo: "texto",
            timestamp: Date.now(),
          });
          input.value = "";
        }
      };

      // Escutador de Mensagens (Único e Organizado)
      onChildAdded(chatRef, (data) => {
        const msg = data.val();
        const msgId = data.key;
        const div = document.createElement("div");
        div.className = msg.usuario === nomeUsuario ? "msg minha-msg" : "msg";
        div.id = `msg-${msgId}`;

        let conteudo = `<b>${msg.usuario}</b>`;
        if (msg.tipo === "imagem") {
          conteudo += `<img src="${msg.texto}" onclick="window.open('${msg.texto}')">`;
        } else if (msg.tipo === "pdf") {
          conteudo += `<div style="padding: 10px; text-align: center;"><i class="fas fa-file-pdf" style="font-size: 1.5rem; color: #ff4757;"></i><p style="font-size: 0.7rem;">PDF</p></div>`;
        } else {
          conteudo += ` ${msg.texto}`;
        }

        // Ações Lado a Lado
        const temArquivo = msg.tipo === "imagem" || msg.tipo === "pdf";
        const ehMeu = msg.usuario === nomeUsuario;

        if (temArquivo || ehMeu) {
          conteudo += `<div class="msg-actions">`;
          if (temArquivo) {
            conteudo += `<button class="btn-download" onclick="baixarArquivo('${msg.texto}', '${msg.nomeOriginal}')"><i class="fas fa-download"></i> Baixar</button>`;
          }
          if (ehMeu) {
            conteudo += `<i class="fas fa-trash-alt btn-delete" onclick="deletarMensagem('${msgId}')"></i>`;
          }
          conteudo += `</div>`;
        }

        div.innerHTML = conteudo;
        document.getElementById("chat-messages").appendChild(div);
        document.getElementById("chat-messages").scrollTop =
          document.getElementById("chat-messages").scrollHeight;

        if (!carregamentoInicial && msg.usuario !== nomeUsuario)
          somNotificacao.play().catch(() => {});
      });

      setTimeout(() => {
        carregamentoInicial = false;
      }, 2000);

      onChildRemoved(chatRef, (data) => {
        document.getElementById(`msg-${data.key}`)?.remove();
      });

      window.deletarMensagem = function (msgId) {
        if (confirm("Apagar para todos?"))
          remove(ref(db, `mensagens/${msgId}`));
      };

      document
        .getElementById("messageInput")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") enviarMensagem();
        });
      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const auth = getAuth();

      // Esta função fica "vigiando" o acesso
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          // Se não tiver um usuário logado no Firebase, expulsa para o login
          window.location.href = "../login.html";
        } else {
          console.log("Usuário autenticado:", user.email);
          // Aqui você pode até atualizar o nome do usuário na tela automaticamente
          // sessionStorage.setItem("nomeUsuario", user.email.split('@')[0]);
        }
      });
    </script>
  </body>
</html>
