<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Global - Portal Cartazista</title>

    <script>
        if (sessionStorage.getItem('logado') !== 'true') {
            window.location.href = "../index.html";
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: url('/imagem/FundoBranco.avif') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; display: flex; flex-direction: column;
        }

        /* CABEÇALHO PADRÃO */
        .header-top {
            background: url('/imagem/FundoAzulEscuro.jpg') center center;
            background-size: cover; height: 80px; display: flex; align-items: center;
            justify-content: space-between; padding: 0 30px; color: white; border-bottom: 4px solid #cc0000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-small { height: 45px; object-fit: contain; }
        .page-name { font-size: 1.4rem; font-weight: bold; text-transform: uppercase; }

        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .user-name { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: white; }
        .btn-home { color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; transition: 0.3s; }
        .btn-home:hover { color: #44bd32; }

        /* CONTEÚDO PADRONIZADO */
        .main-container { flex: 1; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
        
        .content-box {
            background: rgba(255, 255, 255, 0.95); width: 100%; max-width: 900px;
            border-radius: 20px; padding: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: 1px solid #e0e0e0;
            display: flex; flex-direction: column; height: 75vh; /* Altura fixa para o chat caber */
        }

        .modulo-title { color: #002855; border-left: 5px solid #cc0000; padding-left: 15px; margin-bottom: 15px; font-size: 1.4rem; font-weight: bold; }

        /* ÁREA DE MENSAGENS */
        #chat-messages {
            flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa; border-radius: 12px;
            border: 1px solid #ddd; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;
        }

        /* BALÕES DE MENSAGEM MELHORADOS */
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 75%; background: #e9ecef; color: #333; position: relative; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        .msg b { display: block; font-size: 0.7rem; color: #cc0000; margin-bottom: 4px; text-transform: uppercase; }
        
        .minha-msg { align-self: flex-end; background: #002855; color: white; }
        .minha-msg b { color: #44bd32; }

        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }

        /* INPUT E BOTÕES */
        .chat-input-area { display: flex; gap: 10px; align-items: center; background: #eee; padding: 10px; border-radius: 30px; }
        .chat-input-area input[type="text"] { flex: 1; border: none; background: transparent; padding: 5px 10px; outline: none; font-size: 1rem; }
        
        .btn-action { background: #002855; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-action:hover { background: #cc0000; transform: scale(1.1); }

        .msg-actions { display: flex; gap: 10px; margin-top: 5px; font-size: 0.7rem; opacity: 0.7; }
        .btn-del { cursor: pointer; color: #ff4757; }

        .footer { color: white; margin-top: 20px; width: 100%; background: rgba(0, 0, 0, 0.8); padding: 10px; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

    <header class="header-top">
        <div class="header-left">
            <img src="/imagem/LogoApp.png" alt="Logo" class="logo-small">
            <span class="page-name">Bate-papo</span>
        </div>
        
        <div class="header-right">
            <span class="user-name" id="userDisplay">Carregando...</span>
            <a href="/pags/dashboard.html" class="btn-home"><i class="fas fa-home"></i> Home</a>
        </div>
    </header>

    <div class="main-container">
        <div class="content-box">
            <div class="modulo-title">Chat Global</div>
            
            <div id="chat-messages">
                </div>

            <div class="chat-input-area">
                <input type="file" id="fileInput" style="display: none" accept="image/*,application/pdf" onchange="uploadArquivo(this)">
                <button type="button" onclick="document.getElementById('fileInput').click()" class="btn-action" title="Anexar">
                    <i class="fas fa-paperclip"></i>
                </button>
                
                <input type="text" id="messageInput" placeholder="Digite sua mensagem...">
                
                <button onclick="enviarMensagem()" class="btn-action" title="Enviar">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>Copyright &copy; 2026 || Criado por Vinicius Viana - Loja 62</p>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onChildAdded,
        onChildRemoved,
        remove,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyB-Zz9fdr3rQzM-COyWoUA9_egkHfSXKfE",
        authDomain: "portal-cartazista.firebaseapp.com",
        databaseURL: "https://portal-cartazista-default-rtdb.firebaseio.com",
        projectId: "portal-cartazista",
        storageBucket: "portal-cartazista.firebasestorage.app",
        messagingSenderId: "1095457028300",
        appId: "1:1095457028300:web:997edfb47a1d2e8f54ea69",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const chatRef = ref(db, "mensagens");
      const nomeUsuario = sessionStorage.getItem("nomeUsuario") || "Anônimo";
      const somNotificacao = new Audio(
        "https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3",
      );
      let carregamentoInicial = true;

      // Função de Download Binário
      window.baixarArquivo = async function (url, nomeArquivo) {
        try {
          const response = await fetch(url);
          const blob = await response.blob();
          const blobUrl = window.URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = blobUrl;
          link.download = nomeArquivo || "arquivo.png";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          window.URL.revokeObjectURL(blobUrl);
        } catch (e) {
          window.open(url, "_blank");
        }
      };

      // Upload ImgBB
      window.uploadArquivo = async function (input) {
        const file = input.files[0];
        if (!file) return;
        const msgInput = document.getElementById("messageInput");
        msgInput.placeholder = "Enviando...";
        msgInput.disabled = true;

        const formData = new FormData();
        formData.append("image", file);

        try {
          const response = await fetch(
            `https://api.imgbb.com/1/upload?key=d9dfe3393297e81750679887f742711e`,
            { method: "POST", body: formData },
          );
          const data = await response.json();
          push(chatRef, {
            usuario: nomeUsuario,
            texto: data.data.url,
            tipo: file.type.includes("pdf") ? "pdf" : "imagem",
            nomeOriginal: file.name,
            timestamp: Date.now(),
          });
        } catch (error) {
          alert("Erro no upload!");
        } finally {
          msgInput.placeholder = "Digite sua mensagem...";
          msgInput.disabled = false;
        }
      };

      window.enviarMensagem = function () {
        const input = document.getElementById("messageInput");
        if (input.value.trim()) {
          push(chatRef, {
            usuario: nomeUsuario,
            texto: input.value,
            tipo: "texto",
            timestamp: Date.now(),
          });
          input.value = "";
        }
      };

      // Escutador de Mensagens (Único e Organizado)
      onChildAdded(chatRef, (data) => {
        const msg = data.val();
        const msgId = data.key;
        const div = document.createElement("div");
        div.className = msg.usuario === nomeUsuario ? "msg minha-msg" : "msg";
        div.id = `msg-${msgId}`;

        let conteudo = `<b>${msg.usuario}</b>`;
        if (msg.tipo === "imagem") {
          conteudo += `<img src="${msg.texto}" onclick="window.open('${msg.texto}')">`;
        } else if (msg.tipo === "pdf") {
          conteudo += `<div style="padding: 10px; text-align: center;"><i class="fas fa-file-pdf" style="font-size: 1.5rem; color: #ff4757;"></i><p style="font-size: 0.7rem;">PDF</p></div>`;
        } else {
          conteudo += ` ${msg.texto}`;
        }

        // Ações Lado a Lado
        const temArquivo = msg.tipo === "imagem" || msg.tipo === "pdf";
        const ehMeu = msg.usuario === nomeUsuario;

        if (temArquivo || ehMeu) {
          conteudo += `<div class="msg-actions">`;
          if (temArquivo) {
            conteudo += `<button class="btn-download" onclick="baixarArquivo('${msg.texto}', '${msg.nomeOriginal}')"><i class="fas fa-download"></i> Baixar</button>`;
          }
          if (ehMeu) {
            conteudo += `<i class="fas fa-trash-alt btn-delete" onclick="deletarMensagem('${msgId}')"></i>`;
          }
          conteudo += `</div>`;
        }

        div.innerHTML = conteudo;
        document.getElementById("chat-messages").appendChild(div);
        document.getElementById("chat-messages").scrollTop =
          document.getElementById("chat-messages").scrollHeight;

        if (!carregamentoInicial && msg.usuario !== nomeUsuario)
          somNotificacao.play().catch(() => {});
      });

      setTimeout(() => {
        carregamentoInicial = false;
      }, 2000);

      onChildRemoved(chatRef, (data) => {
        document.getElementById(`msg-${data.key}`)?.remove();
      });

      window.deletarMensagem = function (msgId) {
        if (confirm("Apagar para todos?"))
          remove(ref(db, `mensagens/${msgId}`));
      };

      document
        .getElementById("messageInput")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") enviarMensagem();
        });
      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      const auth = getAuth();

      // Esta função fica "vigiando" o acesso
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          // Se não tiver um usuário logado no Firebase, expulsa para o login
          window.location.href = "../login.html";
        } else {
          console.log("Usuário autenticado:", user.email);
          // Aqui você pode até atualizar o nome do usuário na tela automaticamente
          // sessionStorage.setItem("nomeUsuario", user.email.split('@')[0]);
        }
      });
    </script>
</body>
</html>
